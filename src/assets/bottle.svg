<svg width="200" height="400" viewBox="0 0 200 400" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Bottle body -->
  <rect x="60" y="100" width="80" height="250" rx="20" fill="url(#bottleGradient)" stroke="#D4AF37" stroke-width="2"/>
  <!-- Bottle neck -->
  <rect x="85" y="20" width="30" height="80" rx="15" fill="url(#bottleGradient)" stroke="#D4AF37" stroke-width="2"/>
  <!-- Bottle cap -->
  <rect x="80" y="5" width="40" height="20" rx="10" fill="#8B4513" stroke="#654321" stroke-width="1"/>
  <!-- Liquid -->
  <rect x="65" y="200" width="70" height="140" rx="15" fill="url(#liquidGradient)" opacity="0.8"/>
  <!-- Label -->
  <rect x="70" y="150" width="60" height="80" rx="5" fill="#F5F5DC" stroke="#D4AF37" stroke-width="1"/>
  <text x="100" y="180" text-anchor="middle" font-family="serif" font-size="12" fill="#8B4513">BHATKAR</text>
  <text x="100" y="200" text-anchor="middle" font-family="serif" font-size="10" fill="#654321">&amp; CO.</text>

  <defs>
    <linearGradient id="bottleGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#E8E8E8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C0C0C0;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="liquidGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>